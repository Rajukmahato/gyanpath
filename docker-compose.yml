services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: ./server
    env_file: ./server/.env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - redis

  client:
    build: ./client
    env_file: ./client/.env
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
